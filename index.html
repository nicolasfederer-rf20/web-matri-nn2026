<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Matrimonio - Nicole & Nicolás</title>
    <!-- Fuentes elegantes de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --stone-900: #1c1917;
            --stone-800: #292524;
            --stone-400: #a8a29e;
            --stone-200: #e7e5e4;
            --bg-color: #faf9f6;
            --accent-color: #d6d3d1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Cormorant Garamond', serif;
            color: var(--stone-900);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
        }

        .invitation-container {
            width: 100%;
            max-width: 500px;
            background-color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative;
            margin-bottom: 140px; 
        }

        .image-wrapper {
            width: 100%;
            line-height: 0;
        }

        .main-invitation-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Botones Superiores Circulares */
        .control-btn {
            position: fixed;
            top: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--stone-200);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .music-control { right: 20px; }
        .photo-trigger { left: 20px; }

        .control-btn svg {
            width: 20px;
            height: 20px;
            color: var(--stone-800);
        }

        .playing {
            animation: pulse-music 2s infinite;
            background: white;
            border-color: var(--stone-900);
        }

        @keyframes pulse-music {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); box-shadow: 0 0 15px rgba(0,0,0,0.1); }
            100% { transform: scale(1); }
        }

        /* Modal de Foto */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 80vh;
            background: white;
            padding: 10px;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: modalAppear 0.4s ease-out;
        }

        @keyframes modalAppear {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-img {
            max-width: 100%;
            max-height: 70vh;
            display: block;
            border-radius: 2px;
        }

        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Botones Inferiores */
        .actions-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, white 90%, rgba(255,255,255,0));
            padding: 15px 20px 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
            max-width: 500px;
            margin: 0 auto;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            font-weight: 600;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: var(--stone-900);
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        .btn-secondary {
            background-color: white;
            color: var(--stone-800);
            border: 1px solid var(--stone-200);
        }

        .btn:active { transform: scale(0.97); }

        .footer-note {
            padding: 40px 20px 60px 20px;
            text-align: center;
            font-style: italic;
            color: var(--stone-400);
            font-size: 1.1rem;
        }

        @media (max-width: 480px) {
            .invitation-container { margin-bottom: 140px; }
            .actions-overlay { padding-bottom: 25px; }
        }
    </style>
</head>
<body>

    <!-- CONTROL DE MÚSICA (Derecha) -->
    <div class="control-btn music-control" id="musicBtn" onclick="toggleMusic()" title="Reproducir música">
        <svg id="iconMusic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"></path>
            <circle cx="6" cy="18" r="3"></circle>
            <circle cx="18" cy="16" r="3"></circle>
        </svg>
    </div>

    <!-- BOTÓN DE FOTO (Izquierda) -->
    <div class="control-btn photo-trigger" id="photoBtn" onclick="openModal()" title="Ver fotos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.78-8.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
        </svg>
    </div>

    <!-- AUDIO ELEMENT -->
    <audio id="bgMusic" loop preload="auto">
        <source src="cancion.mp3" type="audio/mpeg">
    </audio>

    <!-- MODAL PARA LA FOTO -->
    <div id="photoModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="close-modal" onclick="closeModal()">Cerrar ✕</div>
            <!-- Foto de los novios actualizada -->
            <img src="https://i.postimg.cc/T1jDWGy2/foto2.png" 
                 alt="Los Novios" 
                 class="modal-img">
        </div>
    </div>

    <div class="invitation-container">
        <div class="image-wrapper">
            <img src="https://i.postimg.cc/KjPH8MJS/Invitacion-Matrimonio-N-N-2026-V8.png" 
                 alt="Invitación de Matrimonio Nicole y Nicolás" 
                 class="main-invitation-img">
        </div>
        <div class="footer-note">
            ¡Los esperamos con mucha alegría!
        </div>
    </div>

    <!-- BOTONES INTERACTIVOS -->
    <div class="actions-overlay">
        <a href="https://maps.app.goo.gl/PwfdAbo893TkgYiHA" target="_blank" class="btn btn-primary">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
            Ver Ubicación en Maps
        </a>

        <a href="https://www.noviosparis.cl/home/couple-catalog/7448724" target="_blank" class="btn btn-secondary">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
            </svg>
            Lista de Regalos Paris
        </a>
    </div>

    <script>
        const audio = document.getElementById('bgMusic');
        const btn = document.getElementById('musicBtn');
        const modal = document.getElementById('photoModal');
        let isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                audio.pause();
                btn.classList.remove('playing');
                isPlaying = false;
            } else {
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        btn.classList.add('playing');
                        isPlaying = true;
                    }).catch(error => {
                        console.error("Error al reproducir audio:", error);
                    });
                }
            }
        }

        function openModal() {
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Evita scroll de fondo
        }

        function closeModal() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('touchstart', function() {
            if (!isPlaying) toggleMusic();
        }, { once: true });

        document.addEventListener('click', function() {
            if (!isPlaying) toggleMusic();
        }, { once: true });
    </script>

</body>
</html>
